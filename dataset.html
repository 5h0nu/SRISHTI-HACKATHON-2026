<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Panel - Datasets</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .upload-form-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            outline: none;
            font-family: inherit;
        }
        .form-group textarea {
            resize: vertical;
        }
        .btn-upload {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .btn-upload:hover {
            background: var(--primary-hover);
        }
        .btn-upload:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="dashboard-body">
    <div id="toast" class="toast"></div>

    <div class="layout-wrapper">
        <aside class="sidebar glass-effect">
            <div class="sidebar-header">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>EduPanel</h2>
            </div>
            <ul class="nav-links">
                <li onclick="window.location.href='dashboard.html'"><i class="fa-solid fa-chart-pie"></i> Overview</li>
                <li onclick="window.location.href='students.html'"><i class="fa-solid fa-users"></i> Students</li>
                <li onclick="window.location.href='modules.html'"><i class="fa-solid fa-book"></i> Modules</li>
                <li class="active" onclick="window.location.href='dataset.html'"><i class="fa-solid fa-database"></i> Datasets</li>
                <li id="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="search-bar glass-effect" style="opacity: 0;">
                </div>
                <div class="user-profile">
                    <span id="user-email-display">Loading...</span>
                    <div class="avatar"><i class="fa-solid fa-user-tie"></i></div>
                </div>
            </header>

            <div class="page-header">
                <h1>Upload Dataset to Firebase</h1>
                <p>Upload key-value pairs of dataset information.</p>
            </div>

            <div class="upload-form-container glass-effect animate-up">
                <div class="form-group">
                    <label for="title">Dataset Title</label>
                    <input type="text" id="title" placeholder="Example: biology">
                </div>
                <div class="form-group">
                    <label for="dataset">Dataset Data</label>
                    <textarea id="dataset" rows="10" placeholder='Example:
habitat: A habitat is the natural home of an organism.
photosynthesis: Photosynthesis is the process by which plants make food.
gravity: Gravity pulls objects toward Earth.'></textarea>
                </div>
                <button id="upload-dataset-btn" class="btn-upload">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Upload Dataset
                </button>
            </div>

            <div class="page-header" style="margin-top: 40px;">
                <h2>Uploaded Datasets</h2>
            </div>
            <div class="table-container glass-effect animate-up" style="--delay: 0.2s;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Dataset Title</th>
                            <th>Items Count</th>
                            <th>Upload Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="datasets-table-body">
                        <tr><td colspan="4" class="text-center loading-pulse">Loading datasets...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="dataset.js"></script>
</body>
</html>
